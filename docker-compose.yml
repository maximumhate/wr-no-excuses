services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: worldrun
      POSTGRES_PASSWORD: ${DB_PASSWORD:-worldrun}
      POSTGRES_DB: worldrun
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldrun"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://worldrun:${DB_PASSWORD:-worldrun}@db:5432/worldrun
      BOT_TOKEN: ${BOT_TOKEN}
      CHANNEL_ID: ${CHANNEL_ID}
      GROUP_ID: ${GROUP_ID}
      DOMAIN: ${DOMAIN}
      APP_URL: ${APP_URL}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      ADMIN_IDS: ${ADMIN_IDS}
      SECRET_KEY: ${SECRET_KEY}
    restart: unless-stopped

  bot:
    build: ./bot
    depends_on:
      - backend
    environment:
      DATABASE_URL: postgresql+asyncpg://worldrun:${DB_PASSWORD:-worldrun}@db:5432/worldrun
      BOT_TOKEN: ${BOT_TOKEN}
      CHANNEL_ID: ${CHANNEL_ID}
      GROUP_ID: ${GROUP_ID}
      DOMAIN: ${DOMAIN}
      APP_URL: ${APP_URL}
      ADMIN_IDS: ${ADMIN_IDS}
      SECRET_KEY: ${SECRET_KEY}
    restart: unless-stopped

  frontend:
    build: ./frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
