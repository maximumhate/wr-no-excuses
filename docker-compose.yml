services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: worldrun
      POSTGRES_PASSWORD: ${DB_PASSWORD:-worldrun}
      POSTGRES_DB: worldrun
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldrun"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8010:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://worldrun:${DB_PASSWORD:-worldrun}@db:5432/worldrun
      BOT_TOKEN: ${BOT_TOKEN}
      TELEGRAM_CLIENT_ID: ${TELEGRAM_CLIENT_ID}
      TELEGRAM_CLIENT_SECRET: ${TELEGRAM_CLIENT_SECRET}
      CHANNEL_ID: ${CHANNEL_ID}
      GROUP_ID: ${GROUP_ID}
      DOMAIN: ${DOMAIN}
      APP_URL: ${APP_URL}
      PLATEGA_MERCHANT_ID: ${PLATEGA_MERCHANT_ID}
      PLATEGA_API_KEY: ${PLATEGA_API_KEY}
      PLATEGA_BASE_URL: ${PLATEGA_BASE_URL:-https://app.platega.io}
      ADMIN_IDS: ${ADMIN_IDS}
      SECRET_KEY: ${SECRET_KEY}
    restart: unless-stopped

  bot:
    build: ./bot
    ports:
      - "127.0.0.1:8020:8080"
    depends_on:
      - backend
    environment:
      DATABASE_URL: postgresql+asyncpg://worldrun:${DB_PASSWORD:-worldrun}@db:5432/worldrun
      BOT_TOKEN: ${BOT_TOKEN}
      TELEGRAM_CLIENT_ID: ${TELEGRAM_CLIENT_ID}
      TELEGRAM_CLIENT_SECRET: ${TELEGRAM_CLIENT_SECRET}
      CHANNEL_ID: ${CHANNEL_ID}
      GROUP_ID: ${GROUP_ID}
      DOMAIN: ${DOMAIN}
      APP_URL: ${APP_URL}
      ADMIN_IDS: ${ADMIN_IDS}
      SECRET_KEY: ${SECRET_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_TELEGRAM_CLIENT_ID: ${TELEGRAM_CLIENT_ID}
    ports:
      - "127.0.0.1:5173:5173"
    networks:
      - default
      - web
    restart: unless-stopped

volumes:
  pgdata:

networks:
  web:
    external: true
